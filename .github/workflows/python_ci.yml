name: "Python CI"

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

defaults:
  run:
    working-directory: ./

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python_build
        with:
          python-version: "3.11"
          tags: "[cicd]"

      - name: Run pylint
        run: |
          pylint --rcfile pyproject.toml src/python/ensembl/tools/anno
          pylint --rcfile pyproject.toml tests

  mypy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python_build
        with:
          python-version: "3.11"
          tags: "[cicd]"

      - name: Run mypy
        run: |
          mypy --config-file pyproject.toml src/python/ensembl/tools/anno/
          mypy --config-file pyproject.toml tests

  black:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python_build
        with:
          python-version: "3.11"
          tags: "[cicd]"

      - name: Run black
        run: |
          black --config pyproject.toml --check .

  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python_build
        with:
          python-version: "3.11"
          tags: "[cicd]"

      - name: Run pytest with coverage
        run: |
          mkdir -p reports
          coverage run -m pytest --junitxml=./reports/test_results.xml
          coverage xml -o ./reports/coverage.xml
          coverage report -m

      - name: Add coverage reports
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: ./reports/coverage.xml
          junitxml-path: ./reports/test_results.xml
